/* ─── Mapbox overrides ─── */
.mapbox-pulse-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: #FF6B6B; cursor: pointer;
  box-shadow: 0 0 6px rgba(255,107,107,0.6);
}
.mapbox-pulse-dot::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); width: 24px; height: 24px;
  border-radius: 50%; background: rgba(255,107,107,0.25);
  animation: mapPulse 2.5s ease-out infinite;
}
@keyframes mapPulse {
  0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
}
.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }

/* ─── Animations ─── */
@keyframes scanLine {
  0% { top: 0; }
  50% { top: calc(100% - 2px); }
  100% { top: 0; }
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes moodLabelFade { 0%{opacity:0} 100%{opacity:1} }
@keyframes cardNudge { 0%{transform:rotate(0deg)} 15%{transform:rotate(-1.5deg) scale(1.01)} 30%{transform:rotate(1deg)} 50%{transform:rotate(-0.5deg)} 70%{transform:rotate(0.3deg)} 100%{transform:rotate(0deg)} }
@keyframes modalFloat { 0%{transform:translateY(60px) scale(0.95);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }
@keyframes slideFromRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes slideFromLeft { from{transform:translateX(-100%)} to{transform:translateX(0)} }
@keyframes slideOutLeft { from{transform:translateX(0)} to{transform:translateX(-100%)} }
@keyframes slideOutRight { from{transform:translateX(0)} to{transform:translateX(100%)} }
@keyframes gentleGlow { 0%,100%{box-shadow:0 0 30px rgba(206,255,0,0.05)} 50%{box-shadow:0 0 60px rgba(206,255,0,0.15)} }
@keyframes neonPulse { 0%,100%{text-shadow:0 0 10px rgba(206,255,0,0.3)} 50%{text-shadow:0 0 20px rgba(206,255,0,0.6)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes glassEdgeRotate { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
@keyframes glassSheen { 0%{transform:translateX(-100%) translateY(-100%)} 100%{transform:translateX(100%) translateY(100%)} }

/* ─── Glass effects ─── */
.glass-timer-ring {
  position:absolute; inset:-1px; border-radius:50%; overflow:hidden; pointer-events:none;
}
.glass-timer-ring::before {
  content:""; position:absolute; inset:-2px; border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0%,transparent 30%,rgba(255,255,255,0.5) 38%,rgba(255,255,255,0.8) 40%,rgba(255,255,255,0.5) 42%,transparent 50%,transparent 75%,rgba(255,255,255,0.25) 82%,rgba(255,255,255,0.4) 84%,rgba(255,255,255,0.25) 86%,transparent 94%,transparent 100%);
  animation:glassEdgeRotate 20s linear infinite;
}
.glass-timer-ring::after {
  content:""; position:absolute; inset:1px; border-radius:50%; background:var(--glass-ring-inner);
}
.glass-mood-ring {
  position:absolute; inset:-1px; border-radius:50%; pointer-events:none;
}
.glass-mood-ring::before {
  content:""; position:absolute; inset:0; border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0%,transparent 30%,rgba(255,255,255,0.5) 38%,rgba(255,255,255,0.8) 40%,rgba(255,255,255,0.5) 42%,transparent 50%,transparent 75%,rgba(255,255,255,0.25) 82%,rgba(255,255,255,0.4) 84%,rgba(255,255,255,0.25) 86%,transparent 94%,transparent 100%);
  animation:glassEdgeRotate 20s linear infinite;
  -webkit-mask:radial-gradient(circle,transparent 86%,black 88%);
  mask:radial-gradient(circle,transparent 86%,black 88%);
}

/* ─── Glass data attribute ─── */
[data-glass] { position:relative; overflow:hidden; }
[data-glass]:has(.glass-timer-ring) { overflow:visible; }
[data-glass]::before {
  content:""; position:absolute; inset:0; border-radius:inherit; padding:1px;
  background:linear-gradient(135deg,rgba(255,255,255,0.35) 0%,rgba(255,255,255,0.15) 30%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.15) 70%,rgba(255,255,255,0.3) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;

}
[data-glass].glass-shimmer::after {

  animation:glassSheen 0.6s ease-out forwards; pointer-events:none; z-index:2;
}

/* ─── Global resets ─── */
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }

button { transition:transform 0.15s ease, opacity 0.15s ease; }

const smoothPath = (pts) => {
  if(pts.length<2) return "";
  if(pts.length===2) return `M${pts[0].x},${pts[0].y}L${pts[1].x},${pts[1].y}`;
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    const cp1x=p1.x+(p2.x-p0.x)/6,cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6,cp2y=p2.y-(p3.y-p1.y)/6;
    d+=`C${cp1x},${cp1y},${cp2x},${cp2y},${p2.x},${p2.y}`;
  }
  return d;
};
const INTENSITY_DARK=["#1A3300","#3D6600","#6B9900"];
const INTENSITY_LIGHT=["#F5DCC8","#E8B88A","#D4944A"];
const intensityColor = (dur, max) => {
  if(!dur||dur===0) return T.colors.ring;
  const pal=T===THEME_DARK?INTENSITY_DARK:INTENSITY_LIGHT;
  const r=Math.min(1,dur/(max||1));
  if(r<0.25) return pal[0];
  if(r<0.5) return pal[1];
  if(r<0.75) return pal[2];
  return T.colors.accent;
};

const generateDemoHistory = () => {
  const days=[];const now=new Date();
  for(let i=59;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dateStr=d.toISOString().split("T")[0];
    const dow=d.getDay();
    const isMissed=(i>18&&Math.random()<0.12)||(i>=40&&i<=42);
    if(isMissed){days.push({date:dateStr,totalDuration:0,sessions:[],mood:null});continue;}
    const sc=dow===0||dow===6?1+Math.floor(Math.random()*2):1+Math.floor(Math.random()*3);
    const sessions=[];let total=0;
    for(let s=0;s<sc;s++){const dur=[300,600,900,1200,1800,2700,3600][Math.floor(Math.random()*7)];total+=dur;sessions.push({duration:dur,timestamp:`${6+s*6}:${String(Math.floor(Math.random()*60)).padStart(2,"0")}`});}
    const mood=MOODS[Math.floor(Math.random()*MOODS.length)];
    days.push({date:dateStr,totalDuration:total,sessions,mood});
  }
  return days;
};

const KinenSlideshow = ({kinenList}) => {
  const openKinen=kinenList.filter(k=>k.isOpen);
  const [idx,setIdx]=useState(0);
  const [exitDir,setExitDir]=useState(0);
  const [isAnimating,setIsAnimating]=useState(false);
  const [floats,setFloats]=useState([]);
  const touchRef=useRef(null);
  const timerRef=useRef(null);

  const [nudge,setNudge]=useState(false);
  useEffect(()=>{const demos=[{delay:3000,emoji:"🙏",from:"田中さん"},{delay:7000,emoji:"🔥",from:"山本さん"},{delay:12000,emoji:"✨",from:"佐藤さん"},{delay:18000,emoji:"💪",from:"田中さん"},{delay:25000,emoji:"🌸",from:"鈴木さん"}];const timers=demos.map(r=>setTimeout(()=>{setFloats(p=>[...p,{id:Date.now()+Math.random(),emoji:r.emoji,from:r.from}]);setNudge(true);setTimeout(()=>setNudge(false),600);},r.delay));return()=>timers.forEach(clearTimeout);},[]);
  const removeFloat=(id)=>setFloats(p=>p.filter(r=>r.id!==id));

  const [slideDir,setSlideDir]=useState(0);
  const n=openKinen.length;
  const go=(dir)=>{
    if(isAnimating||n<2)return;
    setIsAnimating(true);
    setSlideDir(dir);
    setTimeout(()=>{
      setIdx(p=>(p+(dir===-1?1:-1)+n)%n);
      setSlideDir(0);
      setIsAnimating(false);
    },500);
  };
  const goNext=()=>go(-1);
  const goPrev=()=>go(1);

  useEffect(()=>{
    if(!n)return;
    clearInterval(timerRef.current);
    timerRef.current=setInterval(goNext,8000);
    return()=>clearInterval(timerRef.current);
  },[idx,n]);

  const onTouchStart=(e)=>{touchRef.current=e.touches[0].clientX;};
  const onTouchEnd=(e)=>{
    if(touchRef.current===null)return;
    const diff=e.changedTouches[0].clientX-touchRef.current;
    touchRef.current=null;
    if(Math.abs(diff)<50)return;
    if(diff<0)goNext(); else goPrev();
  };
  const onTap=(e)=>{
    if(isAnimating)return;
    const rect=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-rect.left;
    if(x>rect.width/2)goNext(); else goPrev();
  };

  if(!n)return null;

  const CARD_H=170;
  const stackCards=[0,1,2].map(offset=>openKinen[(idx+offset)%n]);

  // Background card for items without photo
  const catGradients={
    study:"linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
    family:"linear-gradient(135deg, #1a1a2e 0%, #2d1b3d 50%, #441a5e 100%)",
    work:"linear-gradient(135deg, #1a1a2e 0%, #1b2d2d 50%, #0f4040 100%)",
    personal:"linear-gradient(135deg, #1a1a2e 0%, #2d2d1b 50%, #3d3d0f 100%)",
    health:"linear-gradient(135deg, #1a1a2e 0%, #1b2d1b 50%, #0f400f 100%)",
    other:"linear-gradient(135deg, #1a1a2e 0%, #2d1b1b 50%, #401515 100%)",
  };

  const renderCardFace=(card,cardIdx)=>{
    const hasPhoto=!!card.photo;
    return(
      <React.Fragment>
        <div style={{position:"absolute",inset:0,background:"transparent"}}/>
        <div style={{position:"absolute",inset:0,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderRadius:22,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -1px 0 rgba(255,255,255,0.02), 0 8px 32px rgba(0,0,0,0.3)"}}/>
        {hasPhoto&&(
          <div style={{position:"absolute",top:14,right:16,width:56,height:56,borderRadius:14,overflow:"hidden",border:"1px solid rgba(255,255,255,0.15)",boxShadow:"0 4px 12px rgba(0,0,0,0.3)",zIndex:3}}>
            <img src={card.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
        )}
        <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.08) 70%, transparent 100%)"}}/>
        <div style={{position:"relative",zIndex:2,height:"100%",display:"flex",flexDirection:"column",padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <CategoryTag categoryId={card.category}/>
            <span style={{fontSize:10,color:"rgba(255,255,255,0.5)",fontFamily:T.fonts.mono,padding:"2px 8px",borderRadius:8,background:"rgba(255,255,255,0.06)"}}>{cardIdx%n+1}/{n}</span>
          </div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 0",paddingRight:hasPhoto?48:0}}>
            <p style={{fontFamily:T.fonts.display,fontSize:18,fontWeight:700,color:"rgba(255,255,255,0.95)",lineHeight:1.6,textAlign:"center",maxHeight:80,overflow:"hidden"}}>{card.text}</p>
          </div>
          <div>
            {(card.subtasks||[]).length>0&&(()=>{const total=card.subtasks.length;const done=card.subtasks.filter(s=>s.done).length;return(
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:6}}>
                <div style={{width:60,height:3,borderRadius:2,background:"rgba(255,255,255,0.15)",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:2,background:done===total?T.colors.success:T.colors.accent,width:`${(done/total)*100}%`}}/>
                </div>
                <span style={{fontSize:9,fontFamily:T.fonts.mono,color:"rgba(255,255,255,0.5)"}}>{done}/{total}</span>
              </div>
            );})()}
            {card.deadline&&<div style={{textAlign:"center",marginBottom:6}}><span style={{fontSize:9,fontFamily:T.fonts.mono,color:"rgba(255,255,255,0.4)",padding:"2px 8px",borderRadius:6,background:"rgba(255,255,255,0.05)"}}>〆 {card.deadline}</span></div>}
            <div style={{display:"flex",justifyContent:"center",gap:4}}>
              {openKinen.map((_,i)=><div key={i} style={{width:i===cardIdx%n?16:5,height:5,borderRadius:3,background:i===cardIdx%n?T.colors.accent:"rgba(255,255,255,0.15)",transition:"all 0.4s ease"}}/>)}
            </div>
          </div>
        </div>
      </React.Fragment>
    );
  };

  const currentCard=openKinen[idx];
  const nextCardIdx=(idx+1)%n;
  const prevCardIdx=(idx-1+n)%n;
  const nextCard=openKinen[nextCardIdx];
  const prevCard=openKinen[prevCardIdx];

  return(
    <div style={{width:"100%",padding:"0 24px",position:"relative"}}>
      <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:50}}>
        {floats.map(r=><FloatingReaction key={r.id} emoji={r.emoji} id={r.id} onDone={removeFloat}/>)}
      </div>

      <div style={{position:"relative",height:CARD_H,overflow:"hidden",borderRadius:22,cursor:"pointer"}}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onClick={onTap}>

        {/* Previous card (enters from left) */}
        {slideDir===1&&(
          <div style={{position:"absolute",inset:0,borderRadius:22,overflow:"hidden",transform:"translateX(-100%)",animation:"slideFromLeft 0.5s cubic-bezier(0.4,0,0.2,1) forwards",boxShadow:"0 8px 40px rgba(0,0,0,0.4)"}}>
            {renderCardFace(prevCard,prevCardIdx)}
          </div>
        )}

        {/* Next card (enters from right) */}
        {slideDir===-1&&(
          <div style={{position:"absolute",inset:0,borderRadius:22,overflow:"hidden",transform:"translateX(100%)",animation:"slideFromRight 0.5s cubic-bezier(0.4,0,0.2,1) forwards",boxShadow:"0 8px 40px rgba(0,0,0,0.4)"}}>
            {renderCardFace(nextCard,nextCardIdx)}
          </div>
        )}

        {/* Current card */}
        <div style={{position:"absolute",inset:0,borderRadius:22,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.4)",
          ...(slideDir===-1?{animation:"slideOutLeft 0.5s cubic-bezier(0.4,0,0.2,1) forwards"}:
              slideDir===1?{animation:"slideOutRight 0.5s cubic-bezier(0.4,0,0.2,1) forwards"}:{})}}>
          {renderCardFace(currentCard,idx)}
        </div>
      </div>

      <div style={{marginTop:4,textAlign:"center",fontSize:11,color:T.colors.textMuted,height:17,opacity:floats.length>0?1:0,transition:"opacity 0.5s ease"}}>{floats.length>0?`${floats[floats.length-1]?.from}さんから ${floats[floats.length-1]?.emoji}`:"\u00A0"}</div>
    </div>
  );
};

    const map=new mapboxgl.Map({
      container:mapContainerRef.current,
      style:"mapbox://styles/mapbox/dark-v11",
      center:initCenter,
      zoom:1.2,
      attributionControl:false,
    });
    map.addControl(new mapboxgl.NavigationControl({showCompass:false}),"top-right");
    map.on("load",()=>{
      map.resize();
      DEMO_LIVE_DOTS.forEach(dot=>{
        const el=document.createElement("div");
        el.className="mapbox-pulse-dot";
        el.style.position="relative";
        el.style.animationDelay=dot.delay+"s";
        const marker=new mapboxgl.Marker({element:el}).setLngLat([dot.lng,dot.lat]).addTo(map);
        markersRef.current.push({marker,dot});
      });
    });
    mapRef.current=map;
    setTimeout(()=>{if(mapRef.current)mapRef.current.resize();},100);
    return()=>{
      markersRef.current.forEach(m=>m.marker.remove());
      markersRef.current=[];
      if(mapRef.current){mapRef.current.remove();mapRef.current=null;}
    };
  },[]);

  // Region切替
  useEffect(()=>{
    if(!mapRef.current)return;
    const region=REGIONS.find(r=>r.key===liveSubTab);
    if(region){
      let flyCenter=region.center;
      if(region.key==="world"){
        // 最もマーカーが多いリージョンの中心にフォーカス
        const regionsWithBounds=REGIONS.filter(r=>r.bounds);
        let maxCount=0;let bestRegion=null;
        regionsWithBounds.forEach(r=>{
          const count=DEMO_LIVE_DOTS.filter(d=>d.lat>=r.bounds.latMin&&d.lat<=r.bounds.latMax&&d.lng>=r.bounds.lngMin&&d.lng<=r.bounds.lngMax).length;
          if(count>maxCount){maxCount=count;bestRegion=r;}
        });
        if(bestRegion)flyCenter=bestRegion.center;
      }
      mapRef.current.flyTo({center:flyCenter,zoom:region.zoom,duration:1500});
      markersRef.current.forEach(({marker,dot})=>{
        const el=marker.getElement();
        if(region.bounds){
          const inBounds=dot.lat>=region.bounds.latMin&&dot.lat<=region.bounds.latMax&&dot.lng>=region.bounds.lngMin&&dot.lng<=region.bounds.lngMax;
          el.style.display=inBounds?"block":"none";
        }else{
          el.style.display="block";
        }
      });
    }
  },[liveSubTab]);

  const currentRegion=REGIONS.find(r=>r.key===liveSubTab);
  const activeDots=currentRegion?.bounds?DEMO_LIVE_DOTS.filter(d=>d.lat>=currentRegion.bounds.latMin&&d.lat<=currentRegion.bounds.latMax&&d.lng>=currentRegion.bounds.lngMin&&d.lng<=currentRegion.bounds.lngMax):DEMO_LIVE_DOTS;

  const handleSendReaction=(emoji,targetName)=>{setSentReactions(p=>({...p,[targetName]:[...(p[targetName]||[]),{emoji,time:new Date()}]}));};
  const handleAddToMine=(kinen)=>{onAddToMine(kinen.text,kinen.category);setAddedToast(kinen.id);setTimeout(()=>setAddedToast(null),2000);};

  // Following list: merge live + all following data
  const allFollowing=DEMO_MY_FOLLOWING.map(f=>{
    const liveInfo=DEMO_FOLLOWING_LIVE.find(l=>l.name===f.name);
    return {...f,isLive:!!liveInfo,startedMin:liveInfo?.startedMin||0,region:liveInfo?.region||""};
  });
  const liveFollowing=allFollowing.filter(f=>f.isLive).sort((a,b)=>b.startedMin-a.startedMin);
  const offlineFollowing=allFollowing.filter(f=>!f.isLive);

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 24px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <h2 style={{fontFamily:T.fonts.display,fontSize:22,fontWeight:800,color:T.colors.live,letterSpacing:"-0.02em",textTransform:"uppercase"}}>{t("live_title")}</h2>
            <p style={{fontSize:11,color:T.colors.textDim,marginTop:2}}>{t("live_subtitle")}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:20,background:T.colors.liveSoft,border:`1px solid ${T.colors.live}30`,...G.card}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:T.colors.live,animation:"pulse 2s infinite",boxShadow:`0 0 10px ${T.colors.liveGlow}`}}/>
            <span style={{fontFamily:T.fonts.mono,fontSize:16,fontWeight:400,color:T.colors.live}}>{totalOnline}</span>
            <span style={{fontSize:11,color:T.colors.textMuted}}>{t("live_people_chanting")}</span>
          </div>
        </div>
        {/* ── Sub tabs: Regions + Following ── */}
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none",paddingBottom:2}}>
          {[...REGIONS.map(r=>({key:r.key,label:t("live_"+r.key)})),{key:"following",label:t("live_following")}].map(v=>(
            <button key={v.key} onClick={()=>setLiveSubTab(v.key)} style={{padding:"6px 14px",borderRadius:16,fontSize:11,fontFamily:T.fonts.body,border:`1px solid ${liveSubTab===v.key?T.colors.live+"60":T.colors.border}`,background:liveSubTab===v.key?T.colors.liveSoft:"transparent",color:liveSubTab===v.key?T.colors.live:T.colors.textMuted,cursor:"pointer",transition:"all 0.2s ease",whiteSpace:"nowrap",flexShrink:0}}>{v.label}</button>
          ))}
        </div>
      </div>

      {/* ── Map view (any region tab) ── */}
      {liveSubTab!=="following"&&(
        <div style={{flex:1,margin:"0 24px 24px",borderRadius:20,overflow:"hidden",position:"relative",border:`1px solid ${T.colors.border}`,background:"#111",boxShadow:T.glass.shadow}}>
          <div ref={mapContainerRef} style={{position:"absolute",top:0,left:0,right:0,bottom:0}}/>
          <div style={{position:"absolute",bottom:8,left:12,fontSize:9,color:T.colors.textDim,fontFamily:T.fonts.mono,zIndex:2,background:"rgba(0,0,0,0.5)",padding:"2px 6px",borderRadius:6}}>{currentRegion?.mapLabel||"WORLDWIDE"} · {activeDots.length} active</div>
        </div>
      )}

      {/* ── Following tab ── */}
      {liveSubTab==="following"&&(
        <div style={{flex:1,overflowY:"auto",padding:"4px 24px 24px"}}>
          {/* Live now section */}
          {liveFollowing.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:T.colors.live,boxShadow:`0 0 8px ${T.colors.liveGlow}`,animation:"pulse 2s infinite"}}/>
                <span style={{fontSize:10,color:T.colors.live,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>{t("live_chanting_now")}</span>
                <span style={{fontSize:10,color:T.colors.textDim,fontFamily:T.fonts.mono}}>{liveFollowing.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {liveFollowing.map((user,i)=>{
                  const userKinen=followingKinen.filter(k=>k.userId===user.id&&k.isOpen);
                  const isExp=expandedUser===user.id;
                  return(
                    <div key={user.id} onClick={()=>setExpandedUser(isExp?null:user.id)} style={{position:"relative",borderRadius:18,overflow:"hidden",cursor:"pointer",animation:`slideUp ${0.1+i*0.06}s ease`,transition:"all 0.3s ease"}}>
                      {/* Glass card */}
                      <div style={{position:"relative",padding:"14px 16px",background:"rgba(255,107,107,0.04)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",border:`1px solid ${isExp?T.colors.live+"50":"rgba(255,107,107,0.12)"}`,borderRadius:18,boxShadow:"inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 20px rgba(0,0,0,0.2)"}}>
                        {/* Top refraction line */}
                        <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg, transparent 0%, rgba(255,107,107,0.2) 30%, rgba(255,255,255,0.08) 70%, transparent 100%)",borderRadius:"18px 18px 0 0"}}/>
                        <div style={{display:"flex",alignItems:"center",gap:14}}>
                          <div style={{position:"relative"}}>
                            <UserAvatar name={user.name} color={user.avatarColor} showLive/>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontFamily:T.fonts.body,fontSize:14,fontWeight:600,color:T.colors.text}}>{user.name}</div>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                              <span style={{fontSize:10,color:T.colors.textMuted}}>{user.region}</span>
                              {userKinen.length>0&&<span style={{fontSize:9,color:T.colors.textDim,padding:"1px 6px",borderRadius:6,background:"rgba(255,255,255,0.04)"}}>祈念 {userKinen.length}</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                            <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 12px",borderRadius:12,background:`linear-gradient(135deg, ${T.colors.liveSoft}, rgba(255,107,107,0.15))`,border:"1px solid rgba(255,107,107,0.2)"}}>
                              <span style={{fontFamily:T.fonts.mono,fontSize:14,fontWeight:600,color:T.colors.live}}>{user.startedMin}</span>
                              <span style={{fontSize:9,color:T.colors.live,opacity:0.7}}>min</span>
                            </div>
                          </div>
                        </div>
                        {/* Expanded: cheer + kinen */}
                        {isExp&&(
                          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)",animation:"slideUp 0.2s ease"}}>
                            <div style={{marginBottom:10}}>
                              <div style={{fontSize:10,color:T.colors.textDim,marginBottom:6}}>{t("live_send_cheer")}</div>
                              <MiniReactionBar onReact={(emoji)=>handleSendReaction(emoji,user.name)}/>
                              {(sentReactions[user.name]||[]).length>0&&<div style={{marginTop:4,fontSize:10,color:T.colors.textDim}}>✓ {sentReactions[user.name].map(r=>r.emoji).join(" ")}</div>}
                            </div>
                            {userKinen.length>0&&(
                              <div>
                                <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.06em",marginBottom:6}}>{user.name}{t("live_public_kinen")}</div>
                                {userKinen.map(k=>(
                                  <div key={k.id} style={{padding:"10px 12px",marginBottom:6,borderRadius:12,background:"rgba(255,255,255,0.03)",border:`1px solid ${T.colors.borderLight}`}}>
                                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><CategoryTag categoryId={k.category} size="sm"/></div>
                                    <p style={{fontFamily:T.fonts.body,fontSize:13,color:T.colors.text,lineHeight:1.5,marginBottom:6}}>{k.text}</p>
                                    <ReactionBadges reactions={k.reactions}/>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,paddingTop:6,borderTop:`1px solid ${T.colors.borderLight}`}}>
                                      <MiniReactionBar size="sm" onReact={(emoji)=>onReactKinen(k.id,emoji)}/>
                                      <button onClick={(e)=>{e.stopPropagation();handleAddToMine(k);}} style={{padding:"4px 10px",borderRadius:8,fontSize:10,fontFamily:T.fonts.body,border:`1px solid ${addedToast===k.id?T.colors.success:T.colors.border}`,background:addedToast===k.id?T.colors.successSoft:"transparent",color:addedToast===k.id?T.colors.success:T.colors.textMuted,cursor:"pointer",transition:"all 0.3s ease",whiteSpace:"nowrap"}}>
                                        {addedToast===k.id?"✓ 追加済":"+ 一緒に祈る"}
                                      </button>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Offline section */}
          {offlineFollowing.length>0&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:T.colors.textDim}}/>
                <span style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>{t("live_not_chanting")}</span>
                <span style={{fontSize:10,color:T.colors.textDim,fontFamily:T.fonts.mono}}>{offlineFollowing.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {offlineFollowing.map((user,i)=>(
                  <div key={user.id} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 16px",borderRadius:14,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.colors.borderLight}`,animation:`slideUp ${0.1+i*0.06}s ease`,transition:"all 0.2s ease"}}>
                    <UserAvatar name={user.name} color={user.avatarColor}/>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:T.fonts.body,fontSize:13,fontWeight:500,color:T.colors.textMuted}}>{user.name}</div>
                      <div style={{fontSize:10,color:T.colors.textDim,marginTop:2}}>since {user.since}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// ─── Kinen Tab (from v7) ───
const KinenTab = ({kinenList,setKinenList,followingKinen,onReactKinen,onAddToMine}) => {
  const [viewMode,setViewMode]=useState("mine");
  const [filter,setFilter]=useState("open");
  const [categoryFilter,setCategoryFilter]=useState("all");
  const [showAddForm,setShowAddForm]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [newText,setNewText]=useState("");const [newCategory,setNewCategory]=useState("personal");
  const [newDeadline,setNewDeadline]=useState("");const [newIsPublic,setNewIsPublic]=useState(false);
  const [newPhoto,setNewPhoto]=useState(null);
  const [addedToast,setAddedToast]=useState(null);
  const photoInputRef=useRef(null);
  const [detailKinen,setDetailKinen]=useState(null);
  const [isEditingDetail,setIsEditingDetail]=useState(false);
  const openDetail=(k)=>{setDetailKinen(k);setIsEditingDetail(false);setNewText(k.text);setNewCategory(k.category);setNewDeadline(k.deadline||"");setNewIsPublic(k.isPublic);setNewPhoto(k.photo||null);};
  const closeDetail=()=>{setDetailKinen(null);setIsEditingDetail(false);};
  const saveDetail=()=>{if(!newText.trim()||!detailKinen)return;setKinenList(p=>p.map(k=>k.id===detailKinen.id?{...k,text:newText.trim(),category:newCategory,deadline:newDeadline||null,isPublic:newIsPublic,photo:newPhoto}:k));const updated={...detailKinen,text:newText.trim(),category:newCategory,deadline:newDeadline||null,isPublic:newIsPublic,photo:newPhoto};setDetailKinen(updated);setIsEditingDetail(false);};
  const startEdit=(k)=>{setEditingId(k.id);setNewText(k.text);setNewCategory(k.category);setNewDeadline(k.deadline||"");setNewIsPublic(k.isPublic);setNewPhoto(k.photo||null);setShowAddForm(true);};
  const cancelEdit=()=>{setEditingId(null);setNewText("");setNewCategory("personal");setNewDeadline("");setNewIsPublic(false);setNewPhoto(null);setShowAddForm(false);};
  const saveEdit=()=>{if(!newText.trim())return;setKinenList(p=>p.map(k=>k.id===editingId?{...k,text:newText.trim(),category:newCategory,deadline:newDeadline||null,isPublic:newIsPublic,photo:newPhoto}:k));cancelEdit();};

  const filtered=useMemo(()=>{let list=[...kinenList];if(filter==="open")list=list.filter(k=>k.isOpen);if(filter==="closed")list=list.filter(k=>!k.isOpen);if(categoryFilter!=="all")list=list.filter(k=>k.category===categoryFilter);return list;},[kinenList,filter,categoryFilter]);
  const filteredFollowing=useMemo(()=>{let list=[...followingKinen];if(filter==="open")list=list.filter(k=>k.isOpen);if(filter==="closed")list=list.filter(k=>!k.isOpen);if(categoryFilter!=="all")list=list.filter(k=>k.category===categoryFilter);return list;},[followingKinen,filter,categoryFilter]);

  const openCount=kinenList.filter(k=>k.isOpen).length;
  const closedCount=kinenList.filter(k=>!k.isOpen).length;
  const toggleOpen=(id)=>setKinenList(p=>p.map(k=>k.id===id?{...k,isOpen:!k.isOpen}:k));
  const togglePublic=(id)=>setKinenList(p=>p.map(k=>k.id===id?{...k,isPublic:!k.isPublic}:k));
  const deleteKinen=(id)=>setKinenList(p=>p.filter(k=>k.id!==id));
  const addKinen=()=>{if(!newText.trim())return;setKinenList(p=>[...p,{id:Date.now(),text:newText.trim(),category:newCategory,isOpen:true,isPublic:newIsPublic,deadline:newDeadline||null,createdAt:new Date().toISOString().split("T")[0],photo:newPhoto,subtasks:[]}]);cancelEdit();};
  const handlePhotoSelect=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setNewPhoto(ev.target.result);reader.readAsDataURL(file);};
  const handleAddToMine=(k)=>{onAddToMine(k.text,k.category);setAddedToast(k.id);setTimeout(()=>setAddedToast(null),2000);};
  const [expandedKinen,setExpandedKinen]=useState(null);
  const [newSubtaskText,setNewSubtaskText]=useState("");
  const addSubtask=(kinenId)=>{if(!newSubtaskText.trim())return;setKinenList(p=>p.map(k=>k.id===kinenId?{...k,subtasks:[...(k.subtasks||[]),{id:"st"+Date.now(),text:newSubtaskText.trim(),done:false}]}:k));setNewSubtaskText("");};
  const toggleSubtask=(kinenId,stId)=>setKinenList(p=>p.map(k=>k.id===kinenId?{...k,subtasks:(k.subtasks||[]).map(s=>s.id===stId?{...s,done:!s.done}:s)}:k));
  const deleteSubtask=(kinenId,stId)=>setKinenList(p=>p.map(k=>k.id===kinenId?{...k,subtasks:(k.subtasks||[]).filter(s=>s.id!==stId)}:k));

  const groupedFollowing=useMemo(()=>{const map={};filteredFollowing.forEach(k=>{if(!map[k.userId])map[k.userId]={userName:k.userName,avatarColor:k.avatarColor,items:[]};map[k.userId].items.push(k);});return Object.entries(map);},[filteredFollowing]);

  return(
    <div style={{width:"100%",flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 24px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><h2 style={{fontFamily:T.fonts.display,fontSize:22,fontWeight:800,color:T.colors.accent,letterSpacing:"-0.02em",textTransform:"uppercase"}}>{t("kinen_title")}</h2></div>
          {viewMode==="mine"&&(<button onClick={()=>{if(showAddForm){cancelEdit();}else{setEditingId(null);setShowAddForm(true);}}} style={{width:40,height:40,borderRadius:20,border:`1px solid ${T.colors.border}`,background:showAddForm?T.colors.accentSoft:"transparent",color:T.colors.accent,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:T.fonts.body}}>{showAddForm?"×":"+"}</button>)}
        </div>

        {/* Mine / Following toggle */}
        <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:12,overflow:"hidden",border:`1px solid ${T.colors.border}`,...G.card}}>
          {[{key:"mine",label:t("kinen_mine")},{key:"following",label:t("kinen_following")}].map(v=>(
            <button key={v.key} onClick={()=>{setViewMode(v.key);setShowAddForm(false);}} style={{flex:1,padding:"10px 16px",fontSize:12,fontFamily:T.fonts.body,fontWeight:500,border:"none",background:viewMode===v.key?T.colors.accentSoft:"transparent",color:viewMode===v.key?T.colors.accent:T.colors.textMuted,cursor:"pointer",transition:"all 0.2s ease"}}>{v.label}</button>
          ))}
        </div>

        {/* Add Form */}
        {showAddForm&&viewMode==="mine"&&(
          <div style={{padding:16,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,marginBottom:16,animation:"slideUp 0.3s ease",...G.card}}>
            <textarea value={newText} onChange={e=>setNewText(e.target.value)} placeholder={t("kinen_placeholder")} style={{width:"100%",padding:12,borderRadius:12,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:14,resize:"none",height:72,outline:"none"}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:12}}>
              {CATEGORIES.map(cat=>(<button key={cat.id} onClick={()=>setNewCategory(cat.id)} style={{padding:"4px 12px",borderRadius:12,fontSize:11,border:`1px solid ${newCategory===cat.id?cat.color:T.colors.border}`,background:newCategory===cat.id?`${cat.color}15`:"transparent",color:newCategory===cat.id?cat.color:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}>{cat.label}</button>))}
            </div>
            {/* Photo upload */}
            <input ref={photoInputRef} type="file" accept="image/*" onChange={handlePhotoSelect} style={{display:"none"}}/>
            {newPhoto&&(
              <div style={{position:"relative",marginTop:12,borderRadius:12,overflow:"hidden",height:100}}>
                <img src={newPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <button onClick={()=>setNewPhoto(null)} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:12,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            )}
            <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
              <button onClick={()=>photoInputRef.current?.click()} style={{padding:"8px 14px",borderRadius:10,fontSize:11,border:`1px solid ${T.colors.border}`,background:newPhoto?T.colors.accentSoft:"transparent",color:newPhoto?T.colors.accent:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}>📷 {newPhoto?"Change":"Photo"}</button>
              <input type="date" value={newDeadline} onChange={e=>setNewDeadline(e.target.value)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.mono,fontSize:12,outline:"none"}}/>
              <button onClick={()=>setNewIsPublic(!newIsPublic)} style={{padding:"8px 14px",borderRadius:10,fontSize:11,border:`1px solid ${newIsPublic?T.colors.accent:T.colors.border}`,background:newIsPublic?T.colors.accentSoft:"transparent",color:newIsPublic?T.colors.accent:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}><Icon name={newIsPublic?"lockOpen":"lockClosed"} size={13}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              {editingId&&<button onClick={cancelEdit} style={{flex:1,padding:"12px 20px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.textMuted,fontFamily:T.fonts.body,fontSize:14,fontWeight:600,cursor:"pointer"}}>{t("cancel")}</button>}
              <button onClick={editingId?saveEdit:addKinen} disabled={!newText.trim()} style={{flex:1,padding:"12px 20px",borderRadius:12,border:"none",background:newText.trim()?T.colors.accent:T.colors.ring,color:newText.trim()?T.colors.bg:T.colors.textDim,fontFamily:T.fonts.body,fontSize:14,fontWeight:600,cursor:newText.trim()?"pointer":"default"}}>{editingId?"保存":t("kinen_add")}</button>
            </div>
          </div>
        )}

        {/* Filters */}
        <div style={{display:"flex",gap:6,marginBottom:8}}>

              <div key={kinen.id} onClick={()=>openDetail(kinen)} style={{borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.border}`,opacity:kinen.isOpen?1:0.6,animation:`slideUp ${0.15+i*0.05}s ease`,overflow:"hidden",cursor:"pointer",...G.card}}>

                        <CategoryTag categoryId={kinen.category}/>
                        {kinen.isPublic&&<span style={{fontSize:9,color:T.colors.textDim,padding:"1px 6px",borderRadius:6,background:T.colors.ring}}>{t("kinen_public_badge")}</span>}
                        {kinen.deadline&&<span style={{fontSize:9,fontFamily:T.fonts.mono,padding:"1px 6px",borderRadius:6,color:isOverdue(kinen.deadline)?T.colors.danger:T.colors.textDim,background:isOverdue(kinen.deadline)?T.colors.dangerSoft:T.colors.ring}}>{formatDate(kinen.deadline)}</span>}

                    <button onClick={(ev)=>{ev.stopPropagation();toggleOpen(kinen.id);}} style={{width:28,height:28,borderRadius:14,flexShrink:0,border:`2px solid ${kinen.isOpen?T.colors.accent:T.colors.success}`,background:kinen.isOpen?"transparent":T.colors.successSoft,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",marginTop:4}}>

                    <button onClick={saveDetail} style={{padding:"6px 14px",borderRadius:10,border:"none",background:T.colors.accent,color:T.colors.bg,fontFamily:T.fonts.body,fontSize:11,fontWeight:600,cursor:"pointer"}}>保存</button>
                  </>
                ):(
                  <button onClick={()=>setIsEditingDetail(true)} style={{padding:"6px 14px",borderRadius:10,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.accent,fontFamily:T.fonts.body,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><Icon name="edit" size={11}/> {t("kinen_edit")}</button>
                )}

              {/* Subtasks */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:10,color:T.colors.textDim,marginBottom:8,fontFamily:T.fonts.body}}>{t("kinen_subtask")} {total>0&&<span style={{color:T.colors.textMuted}}>({done}/{total})</span>}</div>
                {total>0&&(
                  <div style={{height:4,borderRadius:2,background:T.colors.ring,overflow:"hidden",marginBottom:10}}>
                    <div style={{height:"100%",borderRadius:2,background:done===total?T.colors.success:T.colors.accent,width:`${(done/total)*100}%`,transition:"width 0.3s ease"}}/>

                {subs.map(st=>(

                    </button>
                    <span style={{flex:1,fontSize:13,fontFamily:T.fonts.body,color:st.done?T.colors.textDim:T.colors.text,textDecoration:st.done?"line-through":"none"}}>{st.text}</span>
                    <button onClick={()=>deleteSubtask(dk.id,st.id)} style={{fontSize:12,color:T.colors.textDim,background:"none",border:"none",cursor:"pointer",padding:"2px 6px",opacity:0.5}}>×</button>

                <div style={{display:"flex",gap:6,marginTop:10}}>
                  <input value={newSubtaskText} onChange={ev=>setNewSubtaskText(ev.target.value)} onKeyDown={ev=>ev.key==="Enter"&&addSubtask(dk.id)} placeholder={t("kinen_add_subtask")} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:12,outline:"none"}}/>
                  <button onClick={()=>addSubtask(dk.id)} style={{padding:"8px 14px",borderRadius:10,border:"none",background:T.colors.accentSoft,color:T.colors.accent,fontSize:12,fontFamily:T.fonts.body,fontWeight:600,cursor:"pointer"}}>{t("kinen_add_subtask_btn")}</button>
                </div>
              </div>

              {/* Footer meta */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:12,borderTop:`1px solid ${T.colors.borderLight}`}}>
                <span style={{fontSize:10,fontFamily:T.fonts.mono,color:T.colors.textDim}}>{t("kinen_created")} {dk.createdAt}</span>
                <button onClick={()=>{deleteKinen(dk.id);closeDetail();}} style={{padding:"6px 14px",borderRadius:10,border:`1px solid ${T.colors.danger}30`,background:T.colors.dangerSoft,color:T.colors.danger,fontSize:11,fontFamily:T.fonts.body,cursor:"pointer"}}>{t("kinen_trash")}</button>
              </div>
            </div>
          </div>
        </div>
      );})()}
    </div>
  );
};


// ─── Journal Entry Form (from v8) ───
const JournalForm = ({onSave,onCancel,sessionDuration,isPostChanting=false}) => {
  const [text,setText]=useState("");
  const [mood,setMood]=useState(null);
  const [isPublic,setIsPublic]=useState(false);
  const [hasPhoto,setHasPhoto]=useState(false);
  const [prompt]=useState(JOURNAL_PROMPTS[Math.floor(Math.random()*JOURNAL_PROMPTS.length)]);

  const handleSave=()=>{if(!text.trim()&&!mood)return;onSave({id:`j${Date.now()}`,date:new Date().toISOString().split("T")[0],time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),mood,text:text.trim(),duration:sessionDuration||0,isPublic,photo:hasPhoto?"demo":null});};

  return(
    <div style={{animation:"slideUp 0.4s ease"}}>
      {isPostChanting&&sessionDuration>0&&(
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontFamily:T.fonts.display,fontSize:20,fontWeight:800,color:T.colors.accent,marginBottom:4,textTransform:"uppercase"}}>{t("post_chanting_done")}</div>
          <div style={{fontFamily:T.fonts.mono,fontSize:12,color:T.colors.textMuted}}>{formatTimeCompact(sessionDuration)} · {t("approx")}{formatHen(secondsToHen(sessionDuration))}{t("hen_unit")}</div>
        </div>
      )}
      <div style={{padding:16,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,...G.card}}>
        <div style={{fontSize:12,color:T.colors.journal,fontFamily:T.fonts.display,fontStyle:"italic",marginBottom:12,padding:"8px 12px",borderRadius:10,background:T.colors.journalSoft,border:`1px solid ${T.colors.journal}20`}}>"{prompt}"</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>{t("journal_feeling")}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {MOODS.map((m)=>(
              <button key={m.label} onClick={()=>setMood(mood?.label===m.label?null:m)} style={{padding:"6px 12px",borderRadius:14,display:"flex",alignItems:"center",gap:4,border:`1px solid ${mood?.label===m.label?m.color:T.colors.border}`,background:mood?.label===m.label?`${m.color}15`:"transparent",color:mood?.label===m.label?m.color:T.colors.textMuted,fontSize:12,fontFamily:T.fonts.body,cursor:"pointer",transition:"all 0.2s ease"}}>
                <span style={{fontSize:14}}>{m.emoji}</span><span>{m.label}</span>
              </button>
            ))}
          </div>
        </div>
        <textarea value={text} onChange={(e)=>setText(e.target.value)} placeholder="唱題で感じたこと、気づき、決意..." style={{width:"100%",padding:14,borderRadius:14,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:14,resize:"none",height:120,outline:"none",lineHeight:1.7}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setHasPhoto(!hasPhoto)} style={{padding:"6px 12px",borderRadius:10,fontSize:11,border:`1px solid ${hasPhoto?T.colors.accent:T.colors.border}`,background:hasPhoto?T.colors.accentSoft:"transparent",color:hasPhoto?T.colors.accent:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}>📷 {hasPhoto?"写真あり":"写真"}</button>
            <button onClick={()=>setIsPublic(!isPublic)} style={{padding:"6px 12px",borderRadius:10,fontSize:11,border:`1px solid ${isPublic?T.colors.accent:T.colors.border}`,background:isPublic?T.colors.accentSoft:"transparent",color:isPublic?T.colors.accent:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}>{isPublic?<><Icon name="lockOpen" size={11}/> 公開</>:<><Icon name="lockClosed" size={11}/> 非公開</>}</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          {onCancel&&(<button onClick={onCancel} style={{flex:1,padding:"12px 20px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.textMuted,fontFamily:T.fonts.body,fontSize:13,cursor:"pointer"}}>{isPostChanting?t("skip"):t("cancel")}</button>)}
          <button onClick={handleSave} disabled={!text.trim()&&!mood} style={{flex:1,padding:"12px 20px",borderRadius:12,border:"none",background:(text.trim()||mood)?T.colors.accent:T.colors.ring,color:(text.trim()||mood)?T.colors.bg:T.colors.textDim,fontFamily:T.fonts.body,fontSize:13,fontWeight:600,cursor:(text.trim()||mood)?"pointer":"default"}}>{t("save")}</button>
        </div>
      </div>
    </div>
  );
};

// ─── Chart Components ───
const WeeklyBarChart = ({history}) => {
  const data=useMemo(()=>{
    const last7=history.slice(-7);
    const max=Math.max(...last7.map(d=>d.totalDuration),1);
    const avg=last7.reduce((s,d)=>s+d.totalDuration,0)/7;
    const total=last7.reduce((s,d)=>s+d.totalDuration,0);
    const dayLabels=[t("chart_day_sun"),t("chart_day_mon"),t("chart_day_tue"),t("chart_day_wed"),t("chart_day_thu"),t("chart_day_fri"),t("chart_day_sat")];
    return{last7,max,avg,total,dayLabels};
  },[history]);
  const W=320,H=130,barW=32,gap=(W-barW*7)/8;
  const avgY=H-((data.avg/data.max)*H*0.85);
  return(
    <div style={{padding:16,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,marginBottom:12,...G.card}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
        <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("chart_weekly")}</div>
        <div><span style={{fontFamily:T.fonts.mono,fontSize:24,fontWeight:800,color:T.colors.accent}}>{formatTimeCompact(data.total)}</span></div>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H+24}`} style={{display:"block"}}>
        <defs>
          <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stopColor={T===THEME_DARK?"#3D6600":"#C8C8BC"}/><stop offset="100%" stopColor={T===THEME_DARK?"#CEFF00":T.colors.accent}/></linearGradient>
        </defs>
        {data.avg>0&&<line x1={0} y1={avgY} x2={W} y2={avgY} stroke={T.colors.textDim} strokeDasharray="4 3" strokeWidth={0.5} opacity={0.5}/>}
        {data.last7.map((d,i)=>{
          const barH=d.totalDuration>0?Math.max(4,(d.totalDuration/data.max)*H*0.85):0;
          const x=gap+(barW+gap)*i;
          const y=H-barH;
          const isToday=i===6;
          const dayDate=new Date(d.date);
          const label=data.dayLabels[dayDate.getDay()];
          return(
            <g key={i}>
              {barH>0&&<rect x={x} y={y} width={barW} height={barH} rx={6} fill="url(#barGrad)" opacity={isToday?1:0.6}/>}
              {isToday&&barH>0&&<rect x={x} y={y} width={barW} height={barH} rx={6} fill="none" stroke={T.colors.accent} strokeWidth={1.5} opacity={0.4}/>}

            </g>
          );
        })}

    </div>
  );
};

const MonthlyTrendChart = ({history}) => {
  const data=useMemo(()=>{
    const last30=history.slice(-30);
    const max=Math.max(...last30.map(d=>d.totalDuration),1);
    const W=320,H=110;
    const pts=last30.map((d,i)=>({x:(i/(last30.length-1))*W,y:H-(d.totalDuration/max)*H*0.85-5}));
    const linePath=smoothPath(pts);
    const lastPt=pts[pts.length-1];
    const areaPath=linePath+`L${W},${H}L0,${H}Z`;
    // trend: compare last 7 vs previous 7
    const recent7=last30.slice(-7).reduce((s,d)=>s+d.totalDuration,0);
    const prev7=last30.slice(-14,-7).reduce((s,d)=>s+d.totalDuration,0);
    const trendPct=prev7>0?Math.round(((recent7-prev7)/prev7)*100):0;
    return{pts,linePath,areaPath,lastPt,W,H,trendPct};
  },[history]);
  return(
    <div style={{padding:16,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,marginBottom:12,...G.card}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:12}}>
        <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("chart_trend_30d")}</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:14,color:data.trendPct>=0?"#00E676":"#FF5252"}}>{data.trendPct>=0?"↑":"↓"}</span>
          <span style={{fontFamily:T.fonts.mono,fontSize:13,fontWeight:700,color:data.trendPct>=0?"#00E676":"#FF5252"}}>{Math.abs(data.trendPct)}%</span>
          <span style={{fontSize:10,color:T.colors.textDim}}>{t("chart_vs_prev")}</span>
        </div>
      </div>
      <svg width="100%" viewBox={`0 0 ${data.W} ${data.H+20}`} style={{display:"block"}}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="rgba(206,255,0,0.25)"/><stop offset="100%" stopColor="rgba(206,255,0,0)"/></linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        {[0.25,0.5,0.75].map((r,i)=><line key={i} x1={0} y1={data.H*(1-r)} x2={data.W} y2={data.H*(1-r)} stroke={T.colors.border} strokeWidth={0.5}/>)}
        <path d={data.areaPath} fill="url(#areaGrad)"/>
        <path d={data.linePath} fill="none" stroke={T.colors.accent} strokeWidth={2} strokeLinecap="round"/>
        {data.lastPt&&<circle cx={data.lastPt.x} cy={data.lastPt.y} r={4} fill={T.colors.accent} filter="url(#glow)"/>}
        <text x={0} y={data.H+14} fill={T.colors.textDim} fontSize={9} fontFamily={T.fonts.mono}>{t("chart_30d_ago")}</text>
        <text x={data.W} y={data.H+14} textAnchor="end" fill={T.colors.accent} fontSize={9} fontFamily={T.fonts.mono}>{t("chart_today")}</text>
      </svg>
    </div>
  );
};

const MoodRingChart = ({journals}) => {
  const data=useMemo(()=>{
    const counts={};
    journals.forEach(j=>{if(j.mood)counts[j.mood.label]=(counts[j.mood.label]||0)+1;});
    const total=Object.values(counts).reduce((s,v)=>s+v,0);
    const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const circumference=2*Math.PI*50;
    let offset=0;
    const segments=entries.map(([label,count])=>{
      const mood=MOODS.find(m=>m.label===label);
      const pct=count/total;
      const arc=pct*circumference;
      const seg={label,count,pct,color:mood?.color||T.colors.textDim,emoji:mood?.emoji||"?",arc,offset,circumference};
      offset+=arc;
      return seg;
    });
    return{segments,total,circumference};
  },[journals]);
  if(data.total===0) return null;
  return(
    <div style={{padding:16,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,marginBottom:12,...G.card}}>
      <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>{t("chart_mood_dist")}</div>
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        <svg width={120} height={120} viewBox="0 0 120 120">
          {data.segments.map((seg,i)=>(
            <circle key={i} cx={60} cy={60} r={50} fill="none" stroke={seg.color} strokeWidth={10}
              strokeDasharray={`${seg.arc} ${seg.circumference-seg.arc}`}
              strokeDashoffset={-seg.offset} strokeLinecap="round"
              transform="rotate(-90 60 60)" opacity={0.85}/>
          ))}
          <text x={60} y={55} textAnchor="middle" fill={T.colors.text} fontSize={22} fontWeight={800} fontFamily={T.fonts.mono}>{data.total}</text>
          <text x={60} y={72} textAnchor="middle" fill={T.colors.textDim} fontSize={9} fontFamily={T.fonts.mono}>entries</text>
        </svg>
        <div style={{display:"flex",flexDirection:"column",gap:6,flex:1}}>
          {data.segments.slice(0,5).map((seg,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14}}>{seg.emoji}</span>
              <div style={{flex:1}}>
                <div style={{height:4,borderRadius:2,background:T.colors.ring,overflow:"hidden"}}>
                  <div style={{width:`${seg.pct*100}%`,height:"100%",borderRadius:2,background:seg.color,transition:"width 0.8s ease"}}/>
                </div>
              </div>
              <span style={{fontFamily:T.fonts.mono,fontSize:10,color:T.colors.textMuted,minWidth:30,textAlign:"right"}}>{Math.round(seg.pct*100)}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── Add Friend Modal ───
const AddFriendModal = ({isOpen,onClose,following,onFollow,myUserId}) => {
  const [mode,setMode]=useState("id");
  const [searchText,setSearchText]=useState("");
  const [toast,setToast]=useState(null);
  const [scanning,setScanning]=useState(false);
  const [scanResult,setScanResult]=useState(null);
  const [copied,setCopied]=useState(false);
  const qrRef=useRef(null);

  // QRコード生成
  useEffect(()=>{
    if(!isOpen||mode!=="qr"||!qrRef.current)return;
    qrRef.current.innerHTML="";
    try{
      const qr=qrcode(0,"M");
      qr.addData(myUserId||"shodai_user");
      qr.make();
      const size=180;const modules=qr.getModuleCount();const cellSize=size/modules;
      let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
      svg+=`<rect width="${size}" height="${size}" fill="#fff" rx="8"/>`;
      for(let r=0;r<modules;r++)for(let c=0;c<modules;c++)if(qr.isDark(r,c))svg+=`<rect x="${c*cellSize}" y="${r*cellSize}" width="${cellSize+0.5}" height="${cellSize+0.5}" fill="#000"/>`;
      svg+=`</svg>`;
      qrRef.current.innerHTML=svg;
    }catch(e){qrRef.current.innerHTML=`<div style="color:#999;font-size:11px">QR生成エラー</div>`;}
  },[isOpen,mode,myUserId]);

  const searchResults=useMemo(()=>{
    if(!searchText.trim())return[];
    const q=searchText.toLowerCase();
    return DEMO_USERS_DB.filter(u=>u.userId.toLowerCase().includes(q)||u.name.includes(q));
  },[searchText]);

  const isFollowing=(userId)=>following.some(f=>f.name===DEMO_USERS_DB.find(u=>u.userId===userId)?.name);

  const handleFollow=(user)=>{
    onFollow({id:`fl_${Date.now()}`,name:user.name,avatarColor:user.avatarColor,since:new Date().toISOString().split("T")[0]});
    setToast(user.name);
    setTimeout(()=>setToast(null),2000);
  };

  const handleScan=()=>{
    setScanning(true);setScanResult(null);
    setTimeout(()=>{
      const notFollowed=DEMO_USERS_DB.filter(u=>!isFollowing(u.userId));
      const found=notFollowed.length>0?notFollowed[Math.floor(Math.random()*notFollowed.length)]:DEMO_USERS_DB[0];
      setScanResult(found);setScanning(false);
    },2500);
  };

  const handleCopyId=()=>{
    if(navigator.clipboard){navigator.clipboard.writeText(myUserId).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});}
    else{setCopied(true);setTimeout(()=>setCopied(false),1500);}
  };

  if(!isOpen)return null;

  return(
    <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)"}}/>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",background:T.colors.surfaceSolid,borderRadius:"24px 24px 0 0",maxHeight:"80vh",display:"flex",flexDirection:"column",animation:"slideUp 0.3s ease",backdropFilter:T.glass.blur,WebkitBackdropFilter:T.glass.blur,boxShadow:"0 -8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.08)",borderBottom:"none"}}>
        {/* Header */}
        <div style={{padding:"20px 24px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{fontFamily:T.fonts.display,fontSize:18,fontWeight:800,color:T.colors.text}}>{t("friend_add_title")}</h3>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.textMuted,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* Tab toggle */}
        <div style={{display:"flex",gap:6,padding:"0 24px 16px"}}>
          {[{key:"id",label:t("friend_id_search")},{key:"qr",label:t("friend_qr")}].map(v=>(
            <button key={v.key} onClick={()=>{setMode(v.key);setScanResult(null);setScanning(false);}} style={{flex:1,padding:"10px 16px",borderRadius:14,fontSize:13,fontFamily:T.fonts.body,fontWeight:mode===v.key?700:400,border:`1px solid ${mode===v.key?T.colors.accent+"60":T.colors.border}`,background:mode===v.key?T.colors.accentSoft:"transparent",color:mode===v.key?T.colors.accent:T.colors.textMuted,cursor:"pointer"}}>{v.label}</button>
          ))}
        </div>

        {/* Content */}
        <div style={{padding:"0 24px 32px",overflowY:"auto",flex:1}}>
          {mode==="id"&&(
            <>
              <div style={{position:"relative",marginBottom:16}}>
                <input value={searchText} onChange={e=>setSearchText(e.target.value)} placeholder={t("friend_search_placeholder")} style={{width:"100%",padding:"12px 16px 12px 40px",borderRadius:14,border:`1px solid ${T.colors.border}`,background:T.colors.surface,color:T.colors.text,fontFamily:T.fonts.body,fontSize:14,outline:"none"}}/>
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:16,color:T.colors.textDim}}>🔍</span>
              </div>
              {searchText.trim()&&searchResults.length===0&&(
                <div style={{textAlign:"center",padding:"24px 0",color:T.colors.textDim,fontSize:13}}>{t("friend_not_found")}</div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {searchResults.map(user=>{
                  const alreadyFollowing=isFollowing(user.userId);
                  return(
                    <div key={user.userId} style={{display:"flex",alignItems:"center",gap:12,padding:14,borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.border}`,...G.card}}>

                <div style={{textAlign:"center",padding:"24px 0",color:T.colors.textDim,fontSize:12}}>{t("friend_search_hint")}</div>

            </>
          )}

          {mode==="qr"&&(
            <>
              {/* My QR Code */}
              <div style={{textAlign:"center",padding:24,borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,marginBottom:16,...G.card}}>
                <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>{t("friend_my_qr")}</div>
                <div ref={qrRef} style={{display:"inline-block",padding:12,background:"#fff",borderRadius:12,marginBottom:12}}/>
                <div style={{fontFamily:T.fonts.mono,fontSize:13,color:T.colors.textMuted,marginBottom:8}}>@{myUserId}</div>
                <button onClick={handleCopyId} style={{padding:"8px 20px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:copied?T.colors.accentSoft:"transparent",color:copied?T.colors.accent:T.colors.textMuted,fontSize:12,fontFamily:T.fonts.body,cursor:"pointer",transition:"all 0.2s ease"}}>{copied?t("friend_copied"):t("friend_copy_id")}</button>
              </div>

              {/* Scan button */}
              <button onClick={handleScan} disabled={scanning} style={{width:"100%",padding:"14px 20px",borderRadius:16,border:"none",background:T.colors.accent,color:T.colors.bg,fontSize:14,fontWeight:700,fontFamily:T.fonts.body,cursor:scanning?"default":"pointer",opacity:scanning?0.6:1,marginBottom:16}}>
                {scanning?"📷 スキャン中...":"📷 QRコードを読み取る"}
              </button>

              {/* Scan animation */}
              {scanning&&(
                <div style={{borderRadius:16,background:T.colors.surface,border:`1px solid ${T.colors.border}`,height:120,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:T.colors.accent,animation:"scanLine 1.5s ease-in-out infinite"}}/>
                  <span style={{fontSize:13,color:T.colors.textDim}}>スキャン中...</span>
                </div>
              )}

              {/* Scan result */}
              {scanResult&&!scanning&&(
                <div style={{display:"flex",alignItems:"center",gap:12,padding:14,borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.accent}40`,animation:"slideUp 0.3s ease"}}>
                  <UserAvatar name={scanResult.name} color={scanResult.avatarColor} size={44}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:T.colors.text}}>{scanResult.name}</div>
                    <div style={{fontSize:11,color:T.colors.textDim,fontFamily:T.fonts.mono}}>@{scanResult.userId}</div>
                  </div>
                  <button onClick={()=>{if(!isFollowing(scanResult.userId))handleFollow(scanResult);}} style={{padding:"8px 16px",borderRadius:20,border:"none",background:isFollowing(scanResult.userId)?T.colors.ring:T.colors.accent,color:isFollowing(scanResult.userId)?T.colors.textDim:T.colors.bg,fontSize:12,fontWeight:700,fontFamily:T.fonts.body,cursor:"pointer"}}>{isFollowing(scanResult.userId)?"フォロー中":"フォロー"}</button>
                </div>
              )}
            </>
          )}
        </div>

        {/* Toast */}
        {toast&&(
          <div style={{position:"absolute",top:80,left:"50%",transform:"translateX(-50%)",padding:"10px 20px",borderRadius:20,background:T.colors.accent,color:T.colors.bg,fontSize:12,fontWeight:700,fontFamily:T.fonts.body,animation:"slideUp 0.3s ease",whiteSpace:"nowrap"}}>{toast}{t("friend_followed_toast")}</div>
        )}
      </div>
    </div>
  );
};

              <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>{t("mypage_edit")}</div>

              {/* Avatar color picker */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                <UserAvatar name={editName||"?"} color={editColor} size={52}/>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {AVATAR_COLORS.map(c=>(
                    <button key={c} onClick={()=>setEditColor(c)} style={{width:24,height:24,borderRadius:12,background:c,border:editColor===c?`2px solid ${T.colors.text}`:`2px solid transparent`,cursor:"pointer",transition:"all 0.2s ease"}}/>
                  ))}

              </div>

              <input value={editName} onChange={e=>setEditName(e.target.value)} placeholder="名前" style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:14,outline:"none",marginBottom:10}}/>
              <textarea value={editBio} onChange={e=>setEditBio(e.target.value)} placeholder="自己紹介..." style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:13,resize:"none",height:60,outline:"none",lineHeight:1.6}}/>
              <div style={{display:"flex",gap:10,marginTop:12}}>

                <button onClick={handleSaveProfile} style={{flex:1,padding:"10px 16px",borderRadius:12,border:"none",background:T.colors.accent,color:T.colors.bg,fontFamily:T.fonts.body,fontSize:12,fontWeight:600,cursor:"pointer"}}>保存</button>

        <div style={{display:"flex",gap:8,marginBottom:16,animation:"slideUp 0.35s ease"}}>

            <div style={{fontSize:9,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("mypage_stat_total")}</div>
            <div style={{fontFamily:T.fonts.mono,fontSize:24,fontWeight:700,marginTop:4,color:T.colors.accent}}>{formatHen(stats.totalHen)}</div>
            <div style={{fontSize:10,color:T.colors.textDim}}>{t("mypage_stat_hen")}</div>

          <div style={{flex:1,padding:"12px 14px",borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.border}`,textAlign:"center",...G.card}}>

          <div style={{flex:1,padding:"12px 14px",borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.border}`,textAlign:"center",...G.card}}>

        {/* ── More Stats ── */}
        <div style={{display:"flex",gap:8,marginBottom:20,animation:"slideUp 0.4s ease"}}>
          <div style={{flex:1,padding:"10px 14px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,...G.card}}>
            <div style={{fontSize:9,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("mypage_stat_total_time")}</div>
            <div style={{fontFamily:T.fonts.mono,fontSize:16,fontWeight:600,marginTop:4}}>{formatTimeCompact(stats.totalTime)}</div>
          </div>
          <div style={{flex:1,padding:"10px 14px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,...G.card}}>
            <div style={{fontSize:9,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("mypage_stat_sessions")}</div>
            <div style={{fontFamily:T.fonts.mono,fontSize:16,fontWeight:600,marginTop:4}}>{stats.totalSessions}{t("mypage_sessions_unit")}</div>
          </div>
          <div style={{flex:1,padding:"10px 14px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,...G.card}}>
            <div style={{fontSize:9,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase"}}>{t("mypage_stat_journals")}</div>
            <div style={{fontFamily:T.fonts.mono,fontSize:16,fontWeight:600,marginTop:4}}>{journals.length}{t("mypage_journals_unit")}</div>
          </div>
        </div>

        {/* ── Activity Charts ── */}
        {demoHistory&&demoHistory.length>0&&(
          <div style={{marginBottom:20,animation:"slideUp 0.42s ease"}}>
            <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{t("chart_activity")}</div>
            <WeeklyBarChart history={demoHistory}/>
            <StreakHeatmap history={demoHistory} streak={stats.streak} bestStreak={stats.bestStreak}/>
            <MonthlyTrendChart history={demoHistory}/>
            <MoodRingChart journals={journals}/>
          </div>
        )}


        {/* ── Mood Analytics ── */}
        {moodLog&&moodLog.length>0&&(()=>{
          const now=new Date(2026,2,20);
          const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-moodPeriod);
          const filtered=moodLog.filter(e=>e.dateObj>=cutoff);
          const data=[...filtered].reverse();
          if(data.length===0)return null;
          const avgDiff=Math.round(data.reduce((s,e)=>s+e.diff,0)/data.length);
          const avgPost=Math.round(data.reduce((s,e)=>s+e.post,0)/data.length);
          const W=300,H=150,PAD_L=28,PAD_R=8,PAD_T=16,PAD_B=28;
          const cw=W-PAD_L-PAD_R,ch=H-PAD_T-PAD_B;
          const xStep=data.length>1?cw/(data.length-1):cw/2;
          const y=v=>PAD_T+ch-(v/100*ch);
          const x=i=>PAD_L+(data.length>1?i*xStep:cw/2);
          const areaPath=data.map((e,i)=>`${x(i)},${y(e.post)}`).join(" ")+` ${x(data.length-1)},${y(0)} ${x(0)},${y(0)}`;
          const preLine=data.map((e,i)=>`${x(i)},${y(e.pre)}`).join(" ");
          const postLine=data.map((e,i)=>`${x(i)},${y(e.post)}`).join(" ");
          const dateLabel=(e)=>{if(!e.dateObj)return e.date||"";const m=e.dateObj.getMonth()+1;const d=e.dateObj.getDate();return `${m}/${d}`;};
          const labelInterval=Math.max(1,Math.floor(data.length/5));
          const bestDuration=(()=>{
            if(moodLog.length<3)return null;
            const sorted=[...moodLog].sort((a,b)=>b.diff-a.diff);
            const top=sorted.slice(0,Math.max(3,Math.ceil(sorted.length*0.4)));
            const mins=top.map(e=>Math.round(e.duration/60));
            const lo=Math.min(...mins);const hi=Math.max(...mins);
            const avg=Math.round(top.reduce((s,e)=>s+e.diff,0)/top.length);
            if(avg<=0)return null;
            return{lo,hi,avg};
          })();
          return <div style={{marginBottom:20,animation:"slideUp 0.46s ease"}}>
            <div style={{fontSize:10,color:T.colors.textDim,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>FEELING</div>
            {/* Period selector */}
            <div style={{display:"flex",gap:0,borderRadius:10,overflow:"hidden",border:`1px solid ${T.colors.border}`,marginBottom:10}}>
              {[{label:"7日",val:7},{label:"14日",val:14},{label:"30日",val:30}].map(p=>
                <button key={p.val} onClick={()=>setMoodPeriod(p.val)} style={{flex:1,padding:"6px 0",fontSize:11,fontFamily:T.fonts.body,fontWeight:moodPeriod===p.val?600:400,border:"none",background:moodPeriod===p.val?T.colors.accentSoft:"transparent",color:moodPeriod===p.val?T.colors.accent:T.colors.textMuted,cursor:"pointer",transition:"all 0.2s"}}>{p.label}</button>
              )}
            </div>
            {/* Chart */}
            <div style={{borderRadius:14,background:T.colors.surface,border:`1px solid ${T.colors.border}`,padding:"8px 4px 4px"}}>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
                <defs><linearGradient id="moodPostFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.colors.accent} stopOpacity="0.15"/><stop offset="100%" stopColor={T.colors.accent} stopOpacity="0.02"/></linearGradient></defs>
                {[0,25,50,75,100].map(v=><line key={v} x1={PAD_L} y1={y(v)} x2={W-PAD_R} y2={y(v)} stroke={T.colors.border} strokeWidth="0.5"/>)}
                {[0,50,100].map(v=><text key={v} x={PAD_L-4} y={y(v)+3} fill={T.colors.textDim} fontSize="7" textAnchor="end" fontFamily={T.fonts.mono}>{v}</text>)}
                <polygon points={areaPath} fill="url(#moodPostFill)"/>
                {data.map((e,i)=><line key={`v${i}`} x1={x(i)} y1={y(e.pre)} x2={x(i)} y2={y(e.post)} stroke={e.diff>=0?"rgba(123,212,160,0.2)":"rgba(255,138,101,0.2)"} strokeWidth="1.5"/>)}
                <polyline points={preLine} fill="none" stroke={T.colors.textMuted} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
                <polyline points={postLine} fill="none" stroke={T.colors.accent} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
                {data.map((e,i)=><React.Fragment key={i}>
                  <circle cx={x(i)} cy={y(e.pre)} r="2.5" fill={T.colors.textMuted} stroke={T.colors.textDim} strokeWidth="0.5"/>
                  <circle cx={x(i)} cy={y(e.post)} r="2.5" fill={T.colors.accent} stroke={T.colors.accentGlow} strokeWidth="0.5"/>
                </React.Fragment>)}
                {data.map((e,i)=>i%labelInterval===0||i===data.length-1?<text key={`d${i}`} x={x(i)} y={H-6} fill={T.colors.textDim} fontSize="6.5" textAnchor="middle" fontFamily={T.fonts.mono}>{dateLabel(e)}</text>:null)}
              </svg>
              <div style={{display:"flex",justifyContent:"center",gap:16,padding:"2px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:T.colors.textMuted}}/>
                  <span style={{fontSize:9,color:T.colors.textDim,fontFamily:T.fonts.body}}>{t("mood_pre_label")}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:T.colors.accent}}/>
                  <span style={{fontSize:9,color:T.colors.textDim,fontFamily:T.fonts.body}}>{t("mood_post_label")}</span></div>
              </div>
            </div>
            {/* Summary stats */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:8}}>
              <div style={{padding:"10px 8px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:700,color:T.colors.success,fontFamily:T.fonts.mono}}>+{avgDiff}</div>
                <div style={{fontSize:9,color:T.colors.textDim,marginTop:2}}>{t("mood_avg_improve")}</div>
              </div>
              <div style={{padding:"10px 8px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:700,color:T.colors.accent,fontFamily:T.fonts.mono}}>{data.length}</div>
                <div style={{fontSize:9,color:T.colors.textDim,marginTop:2}}>{t("mood_sessions")}</div>
              </div>
              <div style={{padding:"10px 8px",borderRadius:12,background:T.colors.surface,border:`1px solid ${T.colors.border}`,textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:700,color:T.colors.text,fontFamily:T.fonts.mono}}>{avgPost}</div>
                <div style={{fontSize:9,color:T.colors.textDim,marginTop:2}}>{t("mood_avg_post")}</div>
              </div>
            </div>
            {/* Insight */}
            {bestDuration&&<div style={{marginTop:8,padding:"10px 14px",borderRadius:12,background:T.colors.accentSoft,border:`1px solid ${T.colors.accentGlow}`,display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:14,color:T.colors.accent}}>✦</div>
              <div style={{fontFamily:T.fonts.body,fontSize:11,color:T.colors.textMuted,lineHeight:1.4}}>
                <span style={{color:T.colors.accent,fontWeight:700}}>{bestDuration.lo===bestDuration.hi?`${bestDuration.lo}${t("time_minutes")}`:`${bestDuration.lo}〜${bestDuration.hi}${t("time_minutes")}`}</span>{t("mood_insight_prefix")}<span style={{color:T.colors.accent,fontWeight:700}}>+{bestDuration.avg}pt</span>{t("mood_insight_suffix")}
              </div>
            </div>}
          </div>;
        })()}

        {/* ── Follow / Followers ── */}
        <div style={{marginBottom:20,animation:"slideUp 0.5s ease"}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <button onClick={()=>{setShowFollowing(!showFollowing);setShowFollowers(false);}} style={{flex:1,padding:"12px 14px",borderRadius:14,background:T.colors.surface,border:`1px solid ${showFollowing?T.colors.accent+"40":T.colors.border}`,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontFamily:T.fonts.mono,fontSize:20,fontWeight:700,color:T.colors.text}}>{following.length}</div>
              <div style={{fontSize:10,color:T.colors.textDim,marginTop:2}}>{t("mypage_following")}</div>
            </button>
            <button onClick={()=>{setShowFollowers(!showFollowers);setShowFollowing(false);}} style={{flex:1,padding:"12px 14px",borderRadius:14,background:T.colors.surface,border:`1px solid ${showFollowers?T.colors.accent+"40":T.colors.border}`,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontFamily:T.fonts.mono,fontSize:20,fontWeight:700,color:T.colors.text}}>{followers.length}</div>
              <div style={{fontSize:10,color:T.colors.textDim,marginTop:2}}>{t("mypage_followers")}</div>
            </button>
            <button onClick={()=>setShowAddFriend(true)} style={{width:52,borderRadius:14,background:T.colors.accent,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:2}}>
              <span style={{fontSize:20,color:T.colors.bg,fontWeight:700}}>+</span>
              <span style={{fontSize:8,color:T.colors.bg,fontWeight:600}}>{t("mypage_add")}</span>
            </button>
          </div>

          <AddFriendModal isOpen={showAddFriend} onClose={()=>setShowAddFriend(false)} following={following} onFollow={onFollow} myUserId={profile.userId}/>
