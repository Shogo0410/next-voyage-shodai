            const now=new Date();
            const entry={pre:preMood,post:postMood,preLabel:MOOD_LABELS_7[getMoodIndex(preMood)],postLabel:MOOD_LABELS_7[getMoodIndex(postMood)],duration:lastSessionDuration,timestamp:now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),dateObj:now,date:now.toLocaleDateString("ja-JP",{month:"short",day:"numeric"}),diff:postMood-preMood};
            setMoodLog(p=>[entry,...p]);
            setShowMoodModal(false);setShowPostJournal(true);setMoodPhase("pre");setPreMood(50);
          }else{
            setPreMoodRecorded(true);setShowMoodModal(false);
            setTimeout(()=>{setElapsed(0);setShowPostJournal(false);setPhase("chanting");},50);
          }
        };
        const handleSkip=()=>{
          if(isPost){setShowMoodModal(false);setShowPostJournal(true);setMoodPhase("pre");setPreMood(50);}
          else{setPreMoodRecorded(false);setShowMoodModal(false);handleStart();}
        };
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,animation:"fadeIn 0.2s ease"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:T.colors.surfaceSolid,borderRadius:24,padding:"32px 24px",width:"85%",maxWidth:340,border:`1px solid ${T.colors.border}`,boxShadow:isDark?"0 20px 60px rgba(0,0,0,0.5)":"0 20px 60px rgba(0,0,0,0.12)",animation:"modalFloat 0.4s cubic-bezier(0.05,0.7,0.1,1)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:T.fonts.display,fontSize:16,fontWeight:700,color:T.colors.text}}>{isPost?t("mood_post_title"):t("mood_pre_title")}</div>
              {isPost&&<div style={{fontSize:11,color:T.colors.textDim,marginTop:4}}>{t("mood_post_msg")}</div>}
            </div>
            <div style={{position:"relative",width:180,height:180}}>
              <div style={{position:"absolute",inset:"-15%",borderRadius:"50%",background:`radial-gradient(circle, ${mc} 0%, transparent 60%)`,opacity:0.45,transition:"background 0.3s ease",pointerEvents:"none"}}/>
              <div style={{position:"relative",width:180,height:180,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isDark?"rgba(255,255,255,0.015)":"rgba(0,0,0,0.02)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",boxShadow:isDark?"0 8px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.12)":"0 8px 40px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)",overflow:"visible"}}>
                <div className="glass-mood-ring"/>
                <div key={`mood-${mi}`} style={{fontSize:16,fontWeight:700,color:T.colors.text,fontFamily:T.fonts.body,animation:"moodLabelFade 0.6s ease-in-out",position:"relative",zIndex:2}}>{MOOD_LABELS_7[mi]}</div>
              </div>
            </div>
            <div style={{width:"100%",maxWidth:280}}>
              <div style={{position:"relative",height:24,borderRadius:12,background:T.colors.ring,border:`1px solid ${T.colors.borderLight}`,display:"flex",alignItems:"center"}}>
                <input type="range" min="0" max="100" value={moodVal} onChange={e=>setMoodVal(Number(e.target.value))} className="mood-slider" style={{width:"100%",height:24,appearance:"none",WebkitAppearance:"none",background:"transparent",cursor:"pointer",outline:"none",position:"relative",zIndex:2,margin:0,padding:0}}/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,width:"100%"}}>
              <button onClick={handleSkip} style={{flex:1,padding:"14px 20px",borderRadius:30,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.textMuted,fontFamily:T.fonts.body,fontSize:13,fontWeight:600,cursor:"pointer"}}>{t("skip")}</button>
              <button onClick={handleMoodRecord} style={{flex:1,padding:"14px 20px",borderRadius:30,border:"none",background:`linear-gradient(180deg, ${T.colors.accent} 0%, ${isDark?"#A8D400":"#A04800"} 100%)`,color:isDark?T.colors.bg:"#FFFFFF",fontFamily:T.fonts.body,fontSize:13,fontWeight:800,cursor:"pointer",boxShadow:`0 4px 20px ${T.colors.accentGlow}`}}>{isPost?t("btn_record"):t("mood_record_start")}</button>
            </div>
          </div>
        </div>);
      })()}

      {/* ── Kinen Add Modal ── */}
      {showKinenAddModal&&(
        <div onClick={()=>setShowKinenAddModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,animation:"fadeIn 0.2s ease"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:T.colors.surface,borderRadius:24,padding:"28px 24px",width:"85%",maxWidth:340,border:`1px solid ${T.colors.border}`,boxShadow:"0 20px 60px rgba(0,0,0,0.5)",animation:"modalFloat 0.4s cubic-bezier(0.05,0.7,0.1,1)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)"}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontFamily:T.fonts.display,fontSize:16,fontWeight:700,color:T.colors.text}}>{t("kinen_add_title")}</div>
            </div>
            <textarea value={kinenModalText} onChange={e=>setKinenModalText(e.target.value)} placeholder={t("kinen_placeholder")} style={{width:"100%",padding:12,borderRadius:12,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.body,fontSize:14,resize:"none",height:72,outline:"none"}}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:12}}>
              {CATEGORIES.map(cat=>(<button key={cat.id} onClick={()=>setKinenModalCategory(cat.id)} style={{padding:"4px 12px",borderRadius:12,fontSize:11,border:`1px solid ${kinenModalCategory===cat.id?cat.color:T.colors.border}`,background:kinenModalCategory===cat.id?`${cat.color}15`:"transparent",color:kinenModalCategory===cat.id?cat.color:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}>{cat.label}</button>))}
            </div>
            <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
              <input type="date" value={kinenModalDeadline} onChange={e=>setKinenModalDeadline(e.target.value)} style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${T.colors.border}`,background:T.colors.bg,color:T.colors.text,fontFamily:T.fonts.mono,fontSize:12,outline:"none"}}/>
              <button onClick={()=>setKinenModalIsPublic(!kinenModalIsPublic)} style={{padding:"8px 14px",borderRadius:10,fontSize:11,border:`1px solid ${kinenModalIsPublic?T.colors.accent:T.colors.border}`,background:kinenModalIsPublic?T.colors.accentSoft:"transparent",color:kinenModalIsPublic?T.colors.accent:T.colors.textMuted,cursor:"pointer",fontFamily:T.fonts.body}}><Icon name={kinenModalIsPublic?"lockOpen":"lockClosed"} size={13}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button onClick={()=>setShowKinenAddModal(false)} style={{flex:1,padding:"12px 20px",borderRadius:12,border:`1px solid ${T.colors.border}`,background:"transparent",color:T.colors.textMuted,fontFamily:T.fonts.body,fontSize:14,fontWeight:600,cursor:"pointer"}}>{t("cancel")}</button>
              <button onClick={addKinenFromModal} disabled={!kinenModalText.trim()} style={{flex:1,padding:"12px 20px",borderRadius:12,border:"none",background:kinenModalText.trim()?T.colors.accent:T.colors.ring,color:kinenModalText.trim()?T.colors.bg:T.colors.textDim,fontFamily:T.fonts.body,fontSize:14,fontWeight:600,cursor:kinenModalText.trim()?"pointer":"default"}}>{t("kinen_add")}</button>
            </div>
          </div>
        </div>
      )}

      {/* ── LIVE TAB ── */}
      {activeTab==="live"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,paddingTop:56}}><LiveTab followingKinen={followingKinen} onReactKinen={handleReactKinen} onAddToMine={handleAddToMine}/></div>}

      {/* ── KINEN TAB ── */}
      {activeTab==="kinen"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,paddingTop:56}}><KinenTab kinenList={kinenList} setKinenList={setKinenList} followingKinen={followingKinen} onReactKinen={handleReactKinen} onAddToMine={handleAddToMine}/></div>}

      {/* ── JOURNAL TAB ── */}
      {activeTab==="journal"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,paddingTop:56}}><JournalTab journals={journals} setJournals={setJournals}/></div>}

      {/* ── MYPAGE TAB ── */}
      {activeTab==="mypage"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1,paddingTop:56}}>
          <div style={{padding:"0 24px 12px"}}>
            <h2 style={{fontFamily:T.fonts.display,fontSize:22,fontWeight:800,color:T.colors.accent,letterSpacing:"-0.02em",textTransform:"uppercase"}}>{t("mypage_title")}</h2>
            <p style={{fontSize:11,color:T.colors.textDim,marginTop:2}}>{t("mypage_subtitle")}</p>
          </div>
          <MyPageTab profile={profile} setProfile={setProfile} todayTotal={todayTotal} journals={journals} kinenList={kinenList} followers={DEMO_MY_FOLLOWERS} following={myFollowing} onFollow={handleFollowUser} demoHistory={demoHistory} lang={lang} setLang={setLang} isDark={isDark} setIsDark={setIsDark} moodLog={moodLog} moodPeriod={moodPeriod} setMoodPeriod={setMoodPeriod}/>
        </div>
      )}

      {/* ── NAV ── */}
      <nav style={{width:"100%",padding:"12px 24px 28px",display:"flex",justifyContent:"space-around",borderTop:`1px solid ${T.colors.border}`,background:activeSoundBg?(isDark?"rgba(5,5,8,0.55)":"rgba(247,246,243,0.55)"):(isDark?"rgba(5,5,8,0.88)":"rgba(247,246,243,0.92)"),backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",position:"relative",zIndex:10,boxShadow:isDark?"0 -4px 20px rgba(0,0,0,0.3)":"0 -4px 20px rgba(0,0,0,0.06)"}}>
        {NAV.map(item=>{const cur=activeTab===item.id;const dis=(phase==="chanting"||phase==="paused"||phase==="completed")&&item.id!=="chanting";return(
          <button key={item.id} onClick={()=>!dis&&setActiveTab(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:dis?"default":"pointer",opacity:dis?0.2:cur?1:0.4,background:"none",border:"none",padding:0}}>
            {item.id==="chanting"?<ShodaiLogo size="sm" showText={false}/>:<span style={{fontSize:18,color:T.colors.text}}>{item.icon}</span>}
            <span style={{fontSize:10,fontFamily:T.fonts.body,color:cur?(item.id==="live"?T.colors.live:item.id==="journal"?T.colors.journal:T.colors.accent):T.colors.textDim}}>{item.label}</span>
          </button>
        );})}
      </nav>
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<ShodaiApp />);

  </script>
</body>
</html>
