<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Voyage - Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.gate{text-align:center;padding:40px;max-width:360px;width:100%}
.gate h1{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px;color:#CEFF00}
.gate p{font-size:13px;color:#777;margin-bottom:32px}
.gate input{width:100%;padding:14px 18px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.045);color:#fff;font-size:16px;outline:none;text-align:center;letter-spacing:0.1em;backdrop-filter:blur(20px)}
.gate input:focus{border-color:rgba(206,255,0,0.3)}
.gate .err{color:#FF6B6B;font-size:12px;margin-top:10px;opacity:0}
.gate .err.show{opacity:1}
.gate button{width:100%;margin-top:16px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#CEFF00,#a8d600);color:#050508;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="gate">
  <h1>NEXT VOYAGE</h1>
  <p>Staging Preview</p>
  <input type="password" id="pw" placeholder="Enter passcode" autofocus>
  <div class="err" id="err">Incorrect passcode</div>
  <button onclick="check()">Enter</button>
</div>
<script>
// Simple hash check (not for real security, just for staging preview)
const HASH='cfb084';
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return(h>>>0).toString(16).slice(0,6);}
function check(){
  const pw=document.getElementById('pw').value;
  if(simpleHash(pw)===HASH){
    sessionStorage.setItem('nv_auth','1');
    window.location.href='shodai-merged.html';
  } else {
    document.getElementById('err').classList.add('show');
    document.getElementById('pw').value='';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
if(sessionStorage.getItem('nv_auth')==='1')window.location.href='shodai-merged.html';
</script>
</body>
</html>
